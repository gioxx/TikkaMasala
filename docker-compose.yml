services:
  cloudflare-tunnel-backup:
    build: .
    container_name: cloudflare-tunnel-backup
    restart: unless-stopped
    environment:
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      AUTO_BACKUP_TIMEZONE: ${AUTO_BACKUP_TIMEZONE:-}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-90}
      NOTIFICATION_WEBHOOK_URL: ${NOTIFICATION_WEBHOOK_URL:-}
      NOTIFICATION_WEBHOOK_EVENTS: ${NOTIFICATION_WEBHOOK_EVENTS:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_NOTIFICATION_EVENTS: ${TELEGRAM_NOTIFICATION_EVENTS:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
